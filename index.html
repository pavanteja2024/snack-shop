<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pavan Night Snack Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: url("bg.jpg") center/cover no-repeat fixed;
  color: white;
}

/* HEADER */
header {
  text-align: center;
  padding: 20px;
  font-size: 28px;
  font-weight: 700;
  color: black;
}

.tagline {
  text-align: center;
  color: black;
  margin-bottom: 20px;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* CARD */
.card {
  background: rgba(0,0,0,0.85);
  border-radius: 15px;
  padding: 15px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(255,0,0,0.8);
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: contain;
}

.price {
  color: #ff3333;
  font-weight: bold;
}

/* BUTTON */
button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  border: none;
  border-radius: 8px;
  background: #ff3333;
  color: white;
  cursor: pointer;
  font-weight: 600;
}

button:hover {
  background: #cc0000;
}

/* CART BAR */
.cart-bar {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #00c853;
  padding: 15px 30px;
  border-radius: 50px;
  font-weight: bold;
  color: white;
  cursor: pointer;
  box-shadow: 0 5px 20px rgba(0,0,0,0.4);
  transition: 0.3s;
}

.cart-bar:hover {
  background: #00b342;
}

</style>
</head>

<body>

<header>🌙 Night Snack Shop</header>
<p class="tagline">Select items and click Order Now 🛒</p>

<div class="container">

  <div class="card">
    <img src="oreo.png">
    <h3>Oreo</h3>
    <p class="price">₹13</p>
    <button onclick="addToCart('Oreo')">Add</button>
  </div>

  <div class="card">
    <img src="bourbon.png">
    <h3>Bourbon</h3>
    <p class="price">₹13</p>
    <button onclick="addToCart('Bourbon')">Add</button>
  </div>

  <div class="card">
    <img src="bingo.png">
    <h3>Bingo</h3>
    <p class="price">₹13</p>
    <button onclick="addToCart('Bingo')">Add</button>
  </div>

  <div class="card">
    <img src="chocopie.png">
    <h3>Lotte Choco Pie</h3>
    <p class="price">₹13</p>
    <button onclick="addToCart('Choco Pie')">Add</button>
  </div>

  <div class="card">
    <img src="moongdal.png">
    <h3>Moong Dal</h3>
    <p class="price">₹13</p>
    <button onclick="addToCart('Moong Dal')">Add</button>
  </div>

  <div class="card">
    <img src="kurkure.png">
    <h3>Kurkure</h3>
    <p class="price">₹13</p>
    <button onclick="addToCart('Kurkure')">Add</button>
  </div>

  <div class="card">
    <img src="aloo.png">
    <h3>Aloo Bhujia</h3>
    <p class="price">₹13</p>
    <button onclick="addToCart('Aloo Bhujia')">Add</button>
  </div>

  <div class="card">
    <img src="tedhe.png">
    <h3>Tedhe Medhe</h3>
    <p class="price">₹13</p>
    <button onclick="addToCart('Tedhe Medhe')">Add</button>
  </div>

</div>

<!-- CART BAR -->
<div class="cart-bar" onclick="orderAll()">
  🛒 <span id="count">0</span> items | Order Now
</div>

<script>

let cart = {};

function addToCart(item) {
  if(cart[item]) {
    cart[item]++;
  } else {
    cart[item] = 1;
  }

  updateCartCount();
}

function updateCartCount() {
  let total = 0;

  for(let item in cart) {
    total += cart[item];
  }

  document.getElementById("count").innerText = total;
}

function orderAll() {
  if(Object.keys(cart).length === 0){
    alert("Cart is empty!");
    return;
  }

  let phone = "919848469818";
  let message = "Hi Pavan, I want to order:\n";

  let i = 1;
  for(let item in cart){
    message += i + ". " + item + " x" + cart[item] + "\n";
    i++;
  }

  let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);
  window.open(url, '_blank');
}

</script>

</body>
</html>
