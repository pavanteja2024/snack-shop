<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pavan Night Snack Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: url("bg.jpg") center/cover no-repeat fixed;
  color: white;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 28px;
  font-weight: 700;
  color: black;
}

.tagline {
  text-align: center;
  color: black;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: rgba(0,0,0,0.85);
  border-radius: 15px;
  padding: 15px;
  text-align: center;
}

.combo {
  border: 2px solid gold;
  box-shadow: 0 0 20px gold;
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: contain;
}

.price {
  color: #ff3333;
  font-weight: bold;
}

.add-btn {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  border-radius: 8px;
  background: #ff3333;
  color: white;
  border: none;
}

.added {
  background: #00c853 !important;
}

.qty {
  display: none;
  margin-top: 10px;
  justify-content: center;
  gap: 10px;
}

.qty button {
  background: #00c853;
  color: white;
  border: none;
  padding: 5px 10px;
}

.cart-bar {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #00c853;
  padding: 15px 30px;
  border-radius: 50px;
  font-weight: bold;
  cursor: pointer;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}

.box {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  width: 300px;
}

input, textarea {
  width: 100%;
  margin: 8px 0;
  padding: 8px;
  border-radius: 5px;
  border: none;
}

button.submit {
  width: 100%;
  padding: 10px;
  background: #00c853;
  border: none;
  color: white;
}

</style>
</head>

<body>

<header>🌙 Night Snack Shop</header>
<p class="tagline">Order your favorite snacks</p>

<div class="container" id="products"></div>

<div class="cart-bar" onclick="openForm()">
🛒 <span id="count">0</span> items | Order Now
</div>

<!-- FORM -->
<div class="modal" id="formModal">
  <div class="box">
    <h3>Enter Details</h3>
    <input id="room" placeholder="Room Number">
    <input id="block" placeholder="Block">
    <textarea id="note" placeholder="Note"></textarea>
    <button class="submit" onclick="showBill()">Next</button>
  </div>
</div>

<!-- BILL -->
<div class="modal" id="billModal">
  <div class="box">
    <h3>🧾 Bill</h3>
    <div id="bill"></div>
    <button class="submit" onclick="confirmOrder()">Confirm Order</button>
  </div>
</div>

<script>

let products = [
  {name:"Oreo", price:13, img:"oreo.png"},
  {name:"Bourbon", price:13, img:"bourbon.png"},
  {name:"Bingo", price:13, img:"bingo.png"},
  {name:"Choco Pie", price:13, img:"chocopie.png"},
  {name:"Moong Dal", price:13, img:"moongdal.png"},
  {name:"Kurkure", price:13, img:"kurkure.png"},
  {name:"Aloo Bhujia", price:13, img:"aloo.png"},
  {name:"Tedhe Medhe", price:13, img:"tedhe.png"},
  {name:"Maggi", price:15, img:"maggi.png"},
  {name:"Jim Jam", price:13, img:"jimjam.png"},
  {name:"Swiss Roll", price:13, img:"swiss.png"},
  {name:"Tiger Biscuit", price:13, img:"tiger.png"},

  {name:"Mini Combo", price:120, img:"combo1.png", combo:true},
  {name:"Mega Combo + Free Oreo", price:200, img:"combo2.png", combo:true}
];

let cart = {};

let container = document.getElementById("products");

products.forEach((p,i)=>{
  container.innerHTML += `
  <div class="card ${p.combo ? 'combo':''}">
    <img src="${p.img}">
    <h3>${p.name}</h3>
    ${p.combo ? '<p style="color:yellow;">Combo Offer</p>' : ''}
    <p class="price">₹${p.price}</p>

    <button class="add-btn" id="btn${i}" onclick="add(${i})">Add</button>

    <div class="qty" id="qty${i}">
      <button onclick="minus(${i})">-</button>
      <span id="c${i}">1</span>
      <button onclick="plus(${i})">+</button>
    </div>
  </div>`;
});

function add(i){
  let n = products[i].name;
  cart[n]=1;

  btn(i,true);
  document.getElementById("qty"+i).style.display="flex";
  update();
}

function plus(i){
  let n = products[i].name;
  cart[n]++;
  document.getElementById("c"+i).innerText=cart[n];
  update();
}

function minus(i){
  let n = products[i].name;
  cart[n]--;

  if(cart[n]<=0){
    delete cart[n];
    btn(i,false);
    document.getElementById("qty"+i).style.display="none";
  } else {
    document.getElementById("c"+i).innerText=cart[n];
  }

  update();
}

function btn(i,state){
  let b=document.getElementById("btn"+i);
  b.classList.toggle("added",state);
  b.innerText=state?"Added":"Add";
}

function update(){
  let t=0;
  for(let i in cart) t+=cart[i];
  document.getElementById("count").innerText=t;
}

function openForm(){
  if(Object.keys(cart).length===0){
    alert("Cart empty!");
    return;
  }
  document.getElementById("formModal").style.display="flex";
}

function showBill(){
  let total=0;
  let html="";

  for(let item in cart){
    let qty=cart[item];
    let price=products.find(p=>p.name===item).price;
    let sub=price*qty;
    total+=sub;

    html+=`${item} x${qty} = ₹${sub}<br>`;
  }

  let delivery = total>=100?0:10;
  let final=total+delivery;

  html+=`<hr>
  Subtotal: ₹${total}<br>
  Delivery: ₹${delivery}<br>
  <b>Total: ₹${final}</b>`;

  window.details={
    room:room.value,
    block:block.value,
    note:note.value,
    total:final
  };

  document.getElementById("bill").innerHTML=html;
  document.getElementById("formModal").style.display="none";
  document.getElementById("billModal").style.display="flex";
}

function confirmOrder(){
  let msg="Hi Pavan, Order:\n";

  for(let i in cart){
    msg+=i+" x"+cart[i]+"\n";
  }

  msg+=`\nRoom:${details.room}
Block:${details.block}
Note:${details.note}
Total: ₹${details.total}`;

  window.open("https://wa.me/919848469818?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
