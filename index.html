<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pavan Night Snack Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

/* BODY */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  color: white;
  background: url("bg.jpg") center/cover no-repeat fixed;
}

/* HEADER */
header {
  text-align: center;
  padding: 20px;
  font-size: 28px;
  font-weight: 700;
  color: black;
}

/* TAGLINE */
.tagline {
  text-align: center;
  margin-top: -10px;
  margin-bottom: 20px;
  color: black;
  font-size: 16px;
}

/* CONTAINER */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* CARD */
.card {
  background: rgba(0, 0, 0, 0.85);
  border-radius: 15px;
  padding: 15px;
  text-align: center;
  transition: 0.3s;
}

/* GLOW EFFECT */
.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(255, 0, 0, 0.8);
}

/* IMAGE */
.card img {
  width: 100%;
  height: 120px;
  object-fit: contain;
}

/* PRICE */
.price {
  color: #ff3333;
  font-weight: bold;
}

/* BUTTON */
button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  border: none;
  border-radius: 8px;
  background: #ff3333;
  color: white;
  font-weight: 600;
  cursor: pointer;
}

button:hover {
  background: #cc0000;
}

</style>
</head>

<body>

<header>🌙 Night Snack Shop</header>

<p class="tagline">Click "Order" to order your favorite snacks 🍫</p>

<div class="container">

  <div class="card">
    <img src="oreo.png">
    <h3>Oreo</h3>
    <p class="price">₹13</p>
    <button onclick="order('Oreo')">Order</button>
  </div>

  <div class="card">
    <img src="bourbon.png">
    <h3>Bourbon</h3>
    <p class="price">₹13</p>
    <button onclick="order('Bourbon')">Order</button>
  </div>

  <div class="card">
    <img src="bingo.png">
    <h3>Bingo</h3>
    <p class="price">₹13</p>
    <button onclick="order('Bingo')">Order</button>
  </div>

  <div class="card">
    <img src="chocopie.png">
    <h3>Lotte Choco Pie</h3>
    <p class="price">₹13</p>
    <button onclick="order('Lotte Choco Pie')">Order</button>
  </div>

  <div class="card">
    <img src="moongdal.png">
    <h3>Moong Dal</h3>
    <p class="price">₹13</p>
    <button onclick="order('Moong Dal')">Order</button>
  </div>

  <div class="card">
    <img src="kurkure.png">
    <h3>Kurkure</h3>
    <p class="price">₹13</p>
    <button onclick="order('Kurkure')">Order</button>
  </div>

  <div class="card">
    <img src="aloo.png">
    <h3>Aloo Bhujia</h3>
    <p class="price">₹13</p>
    <button onclick="order('Aloo Bhujia')">Order</button>
  </div>

  <div class="card">
    <img src="tedhe.png">
    <h3>Tedhe Medhe</h3>
    <p class="price">₹13</p>
    <button onclick="order('Tedhe Medhe')">Order</button>
  </div>

</div>

<script>
function order(item) {
  let phone = "919848469818";
  let message = "Hi Pavan, I want to order: " + item;
  let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);
  window.open(url, '_blank');
}
</script>

</body>
</html>
